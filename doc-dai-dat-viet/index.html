<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dọc Dải Đất Việt — Ns Bùi Công</title>
    <meta name="description" content="Nghe Dọc Dải Đất Việt của Ns Bùi Công trên Spotify, Apple Music, YouTube và nhiều nền tảng khác.">
    <meta property="og:title" content="Dọc Dải Đất Việt — Ns Bùi Công">
    <meta property="og:description" content="Nghe ngay trên nền tảng yêu thích của bạn!">
    <meta property="og:image" content="../cover-doc-dai-dat-viet.jpg">
    <meta property="og:type" content="music.song">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#050c18">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            background: #060d18;
            overflow-x: hidden;
        }

        /* ── BACKGROUND ── */
        .bg {
            position: fixed; inset: 0; z-index: 0;
            background: url('../cover-doc-dai-dat-viet.jpg') center / cover no-repeat;
            filter: blur(28px) brightness(0.28) saturate(1.4);
            transform: scale(1.15);
            will-change: transform;
        }
        .bg-overlay {
            position: fixed; inset: 0; z-index: 1;
            background: linear-gradient(150deg, rgba(4,14,35,.82) 0%, rgba(3,9,22,.65) 50%, rgba(4,12,8,.85) 100%);
        }
        .orb {
            position: fixed; z-index: 2; pointer-events: none; border-radius: 50%;
            filter: blur(70px);
        }
        .orb1 { width: min(340px,70vw); height: min(340px,70vw); background: radial-gradient(circle,rgba(200,30,30,.18),transparent); top: -10%; left: -10%; animation: drift 12s ease-in-out infinite; }
        .orb2 { width: min(260px,55vw); height: min(260px,55vw); background: radial-gradient(circle,rgba(255,210,0,.12),transparent); bottom: -8%; right: -8%; animation: drift 15s ease-in-out infinite reverse; }
        @keyframes drift { 0%,100%{transform:translate(0,0);} 50%{transform:translate(-15px,18px);} }

        /* ── LAYOUT ── */
        .page {
            position: relative; z-index: 10;
            min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            padding: max(16px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
        }

        /* ── CARD ── */
        .card {
            width: 100%; max-width: 420px;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 24px 70px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.07) inset;
            animation: cardIn .8s cubic-bezier(.34,1.45,.64,1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(40px) scale(.93); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── HERO ── */
        .hero {
            padding: 28px 22px 44px;
            background: rgba(4,12,30,.58);
            backdrop-filter: blur(22px) saturate(1.8);
            -webkit-backdrop-filter: blur(22px) saturate(1.8);
            border-bottom: 1px solid rgba(255,255,255,.07);
            text-align: center; position: relative;
        }
        .back-btn {
            position: absolute; top: 14px; left: 14px;
            display: inline-flex; align-items: center; gap: 5px;
            min-height: 36px; padding: 0 8px;
            color: rgba(255,255,255,.45); font-size: .75rem;
            text-decoration: none; border-radius: 8px;
            transition: color .2s; -webkit-tap-highlight-color: transparent;
        }
        .back-btn:active, .back-btn:hover { color: rgba(255,255,255,.9); }
        .back-btn svg { width: 16px; height: 16px; fill: currentColor; }

        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(135deg,rgba(200,30,30,.9),rgba(170,15,15,.75));
            color: #fff; font-size: .58rem; font-weight: 700;
            letter-spacing: .14em; text-transform: uppercase;
            padding: 5px 13px; border-radius: 30px; margin-bottom: 18px;
            box-shadow: 0 4px 14px rgba(200,30,30,.35);
        }
        .badge-dot { width: 5px; height: 5px; background: #fff; border-radius: 50%; animation: blink 1.6s infinite; }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.25;} }

        .art-wrap {
            position: relative; display: inline-block;
            margin-bottom: 20px;
            animation: artPop .9s .15s cubic-bezier(.34,1.45,.64,1) both;
        }
        @keyframes artPop { from{opacity:0;transform:scale(.72) rotate(-2deg);} to{opacity:1;transform:scale(1) rotate(0);} }
        .art-wrap img {
            width: min(175px, 44vw); height: min(175px, 44vw);
            border-radius: 14px; object-fit: cover; display: block;
            box-shadow: 0 18px 50px rgba(0,0,0,.6), 0 0 0 2px rgba(255,255,255,.1);
        }
        .art-glow {
            position: absolute; bottom: -16px; left: 5%; width: 90%; height: 28px;
            background: linear-gradient(to right, rgba(200,30,30,.45),rgba(255,180,0,.25),rgba(200,30,30,.45));
            filter: blur(12px); border-radius: 50%;
        }

        .artist-row {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-bottom: 8px; animation: fadeIn .7s .4s both;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .artist-ava {
            width: 24px; height: 24px; border-radius: 50%; object-fit: cover;
            border: 1.5px solid rgba(255,255,255,.2);
        }
        .artist-name-txt { color: rgba(255,255,255,.6); font-size: .8rem; font-weight: 500; }
        .song-title {
            color: #fff; font-size: clamp(1.35rem, 5vw, 1.6rem);
            font-weight: 800; line-height: 1.2; margin-bottom: 4px;
            animation: fadeIn .7s .5s both;
        }
        .song-meta { color: rgba(255,255,255,.42); font-size: .78rem; animation: fadeIn .7s .6s both; }

        /* ── WAVE ── */
        .wave { display: block; width: 100%; margin-bottom: -1px; }

        /* ── STORES ── */
        .stores { background: #f8f8fc; padding: 18px 18px 12px; }
        .stores-lbl {
            font-size: .6rem; font-weight: 700; letter-spacing: .14em;
            text-transform: uppercase; color: #9898b8; margin-bottom: 8px; padding-left: 2px;
        }

        .store-item {
            display: flex; align-items: center; justify-content: space-between;
            min-height: 52px; padding: 0 8px;
            border-radius: 12px; text-decoration: none;
            transition: background .15s; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            animation: slideIn .45s both;
        }
        .store-item:nth-child(1){animation-delay:.06s} .store-item:nth-child(2){animation-delay:.10s}
        .store-item:nth-child(3){animation-delay:.14s} .store-item:nth-child(4){animation-delay:.18s}
        .store-item:nth-child(5){animation-delay:.22s} .store-item:nth-child(6){animation-delay:.26s}
        .store-item:nth-child(7){animation-delay:.30s}
        @keyframes slideIn { from{opacity:0;transform:translateX(-10px);} to{opacity:1;transform:translateX(0);} }
        .store-item:active { background: rgba(200,30,30,.06); }
        @media (hover: hover) {
            .store-item:hover { background: rgba(200,30,30,.05); transform: translateX(3px); }
            .store-item:hover .play-lbl { background: linear-gradient(135deg,#c81e1e,#e05010); color: #fff; border-color: transparent; box-shadow: 0 4px 12px rgba(200,30,30,.38); }
        }

        .logo-box { height: 36px; display: flex; align-items: center; gap: 9px; flex: 1; }
        .brand-icon { width: 30px; height: 30px; flex-shrink: 0; }
        .brand-name { font-size: .82rem; font-weight: 700; color: #1a1a2e; line-height: 1; white-space: nowrap; letter-spacing: -.01em; }

        .play-lbl {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 7px 14px; border-radius: 30px;
            border: 1.5px solid #ddddf0; background: #fff;
            font-family: 'Inter', sans-serif; font-size: .76rem; font-weight: 600;
            color: #4a4a6a; white-space: nowrap;
            transition: background .15s, color .15s, border-color .15s, box-shadow .15s;
        }
        .play-lbl svg { flex-shrink: 0; }

        .sep { height: 1px; background: linear-gradient(to right,transparent,#e8e8f0,transparent); margin: 0 8px; }

        /* ── FOOTER CARD ── */
        .foot { background: #f8f8fc; padding: 4px 18px calc(16px + env(safe-area-inset-bottom,0)); }
        .share-btn {
            display: flex; align-items: center; justify-content: center; gap: 7px;
            width: 100%; min-height: 44px; border-radius: 12px;
            background: rgba(200,30,30,.06); border: 1px dashed rgba(200,30,30,.28);
            color: #c81e1e; font-size: .8rem; font-weight: 600;
            cursor: pointer; font-family: 'Inter', sans-serif;
            transition: background .15s;
            margin-bottom: 12px; -webkit-tap-highlight-color: transparent;
        }
        .share-btn:active { background: rgba(200,30,30,.12); }
        .foot-txt { font-size: .65rem; color: #c0c0d0; letter-spacing: .08em; text-transform: uppercase; text-align: center; }
        .foot-txt a { color: #c81e1e; text-decoration: none; font-weight: 600; }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: max(24px,env(safe-area-inset-bottom,24px)); left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #111; color: #fff; padding: 10px 22px;
            border-radius: 30px; font-size: .82rem; font-weight: 500;
            box-shadow: 0 8px 25px rgba(0,0,0,.4); z-index: 999;
            transition: transform .32s cubic-bezier(.34,1.45,.64,1), opacity .28s;
            opacity: 0; pointer-events: none; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
        }
    </style>
</head>

<div class="toast" id="toast" role="status" aria-live="polite">✅ Đã copy link!</div>

<script>
function shareThis() {
    const url = location.href, title = 'Dọc Dải Đất Việt — Ns Bùi Công';
    if (navigator.share) {
        navigator.share({ title, url }).catch(() => {});
    } else {
        navigator.clipboard.writeText(url).then(showToast).catch(() => {});
    }
}
function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
}
</script>
